<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Digital Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        html, body, #app-wrapper { height: 100%; width: 100%; }
        #app-wrapper { overflow-y: auto; background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%); transition: background 0.3s ease; }
        .theme-toggle { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; z-index: 1000; }
        .theme-toggle:hover { transform: translateY(-4px) scale(1.05); }
        :root { --bg-primary: #ffffff; --bg-secondary: #f8fafc; --text-primary: #1e293b; --text-secondary: #64748b; --accent-primary: #667eea; --accent-secondary: #764ba2; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #e2e8f0; --gradient-start: #667eea; --gradient-end: #764ba2; }
        [data-theme="dark"] { --bg-primary: #1e293b; --bg-secondary: #0f172a; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --accent-primary: #818cf8; --accent-secondary: #a78bfa; --success: #34d399; --warning: #fbbf24; --danger: #f87171; --border: #334155; --gradient-start: #4c1d95; --gradient-end: #1e1b4b; }
        .container-main { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .card { background: var(--bg-primary); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
        .card-header { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }
        .input-field { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-primary); color: var(--text-primary); }
        .label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
        .scorecard { background: var(--bg-secondary); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border); transition: all 0.3s ease; }
        .scorecard-value { font-size: 36px; font-weight: 900; margin: 8px 0; }
        .scorecard-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .scorecard.good .scorecard-value { color: var(--success); }
        .scorecard.bad .scorecard-value { color: var(--danger); }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; background: var(--bg-primary); padding: 16px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tab { padding: 14px 28px; background: rgba(102,125,234,0.1); border-radius: 12px; font-weight: 700; color: var(--text-primary); cursor: pointer; transition: all 0.3s ease; }
        .nav-tab.active { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; box-shadow: 0 6px 20px rgba(102,125,234,0.4); transform: translateY(-2px); }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; padding: 12px; text-align: left; font-weight: 600; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: var(--bg-secondary); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: var(--bg-primary); border-radius: 16px; padding: 32px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .toast { position: fixed; top: 24px; right: 24px; padding: 16px 24px; border-radius: 12px; color: white; font-weight: 600; z-index: 10000; animation: slideIn 0.3s ease-out; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .spinner { border: 3px solid rgba(102,125,234,0.3); border-radius: 50%; border-top-color: var(--accent-primary); width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; color: white; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .chart-container { position: relative; height: 360px; margin-top: 16px; margin-bottom: 16px; }
        .clickable-row { cursor: pointer; transition: 0.2s; }
        .clickable-row:hover { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important; color: white; }
        .status-good { color: var(--success); font-weight: 600; }
        .status-bad { color: var(--danger); font-weight: 600; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; background: rgba(102,125,234,0.1); color: var(--accent-primary); }
        .wrap-text { white-space: normal !important; word-break: break-word; }
        .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .detail-item { background: var(--bg-secondary); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent-primary); margin-bottom: 8px; }
        .edit-mode-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>
<body class="h-full">
    <div id="app-wrapper" class="h-full w-full"></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn">🌙</button>

    <script>
        Chart.register(ChartDataLabels);
        
        const SUPABASE_URL = 'https://ehespstzpubqkovkykby.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZXNwc3R6cHVicWtvdmt5a2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU1MDY4MjUsImV4cCI6MjA4MTA4MjgyNX0.XTuuHksJVe8ZEwcN5gshXNz7WqEWVPr10eIsYO-zar4';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentPage = 'dashboard';
        let allMachines = [];
        let allOEERecords = [];
        let isManagementUnlocked = false;
        let chartInstances = {};
        let editMode = false;
        let editingRecordId = null;
        let filters = { 
            startDate: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0], 
            endDate: new Date().toISOString().split('T')[0], 
            shift: 'all', 
            machine: 'all', 
            pic: 'all'
        };
        let currentMachineData = null, currentMachineDetails = null;
        const MANAGEMENT_PASSWORD = 'admin123';
        const SHIFTS = { 
            'Shift 1': { start: '07:00', end: '15:30', minutes: 510 }, 
            'Shift 2': { start: '15:20', end: '22:50', minutes: 450 }, 
            'Shift 3': { start: '22:40', end: '07:10', minutes: 530 }, 
            'Longshift Pagi': { start: '07:00', end: '19:00', minutes: 720 }, 
            'Longshift Malam': { start: '19:00', end: '07:00', minutes: 720 } 
        };
        const defaultConfig = { system_title: "OEE Digital Monitoring System PT. GOF", company_name: "Created by MSTD GOF" };

        function toggleTheme() { 
            let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; 
            document.documentElement.setAttribute('data-theme', t); 
            localStorage.setItem('oee-theme', t); 
            document.getElementById('theme-toggle-btn').textContent = t === 'dark' ? '☀️' : '🌙'; 
        }
        
        function showToast(msg, type='success') { 
            let d = document.createElement('div'); 
            d.className = `toast ${type}`; 
            d.textContent = msg; 
            document.body.appendChild(d); 
            setTimeout(() => d.remove(), 3000); 
        }
        
        function showLoading(m='Loading...') { 
            let d = document.createElement('div'); 
            d.id = 'loading-overlay'; 
            d.className = 'loading-overlay'; 
            d.innerHTML = `<div class="spinner"></div><p>${m}</p>`; 
            document.body.appendChild(d); 
        }
        
        function hideLoading() { 
            let d = document.getElementById('loading-overlay'); 
            if(d) d.remove(); 
        }
        
        function closeModal() { 
            let m = document.getElementById('modal'); 
            if(m) m.remove(); 
        }
        
        function safeJSONParse(s, d=[]) { 
            try { 
                if(!s) return d; 
                let p = typeof s === 'string' ? JSON.parse(s) : s; 
                return p || d; 
            } catch(e) { 
                return d; 
            } 
        }

        async function loadMachines() { 
            let {data, error} = await db.from('machines').select('*').eq('is_deleted', false).order('created_at', {ascending: false}); 
            if(!error) allMachines = data || []; 
            return allMachines; 
        }
        
        async function loadOEERecords() { 
            let {data, error} = await db.from('oee_records').select('*').order('date', {ascending: false}); 
            if(!error) allOEERecords = data || []; 
            return allOEERecords; 
        }
        
        async function loadMachineDetails(id) { 
            let [odt, lsm, lsnm, ms] = await Promise.all([
                db.from('machine_odt').select('*').eq('machine_id', id), 
                db.from('machine_line_stop_mesin').select('*').eq('machine_id', id), 
                db.from('machine_line_stop_non_mesin').select('*').eq('machine_id', id), 
                db.from('machine_minor_stop').select('*').eq('machine_id', id)
            ]); 
            return { odt: odt.data || [], lineStopMesin: lsm.data || [], lineStopNonMesin: lsnm.data || [], minorStop: ms.data || [] }; 
        }
        
        async function saveOEERecord(d) { 
            let clean = {...d, odt_data: JSON.stringify(d.odt_data || []), line_stop_mesin_data: JSON.stringify(d.line_stop_mesin_data || []), line_stop_non_mesin_data: JSON.stringify(d.line_stop_non_mesin_data || []), minor_stop_data: JSON.stringify(d.minor_stop_data || [])}; 
            let {data, error} = await db.from('oee_records').insert([clean]).select().single(); 
            if(error) throw error; 
            return data; 
        }
        
        async function updateOEERecord(id, d) { 
            let clean = {...d, odt_data: JSON.stringify(d.odt_data || []), line_stop_mesin_data: JSON.stringify(d.line_stop_mesin_data || []), line_stop_non_mesin_data: JSON.stringify(d.line_stop_non_mesin_data || []), minor_stop_data: JSON.stringify(d.minor_stop_data || [])}; 
            let {data, error} = await db.from('oee_records').update(clean).eq('id', id).select().single(); 
            if(error) throw error; 
            return data; 
        }

        function getFilteredRecords() {
            return allOEERecords.filter(r => { 
                if(!r.date) return false; 
                let d = new Date(r.date), s = new Date(filters.startDate), e = new Date(filters.endDate); 
                return d >= s && d <= e && (filters.shift === 'all' || r.shift === filters.shift) && (filters.machine === 'all' || r.machine_name === filters.machine) && (filters.pic === 'all' || r.pic === filters.pic); 
            });
        }

        function renderDashboard() {
            let filtered = getFilteredRecords();
            let avgA = filtered.length ? filtered.reduce((s,r) => s + (r.availability_actual || 0), 0) / filtered.length : 0;
            let avgP = filtered.length ? filtered.reduce((s,r) => s + (r.performance || 0), 0) / filtered.length : 0;
            let avgQ = filtered.length ? filtered.reduce((s,r) => s + (r.quality || 0), 0) / filtered.length : 0;
            let oeeActualAvg = (avgA * avgP * avgQ) / 10000;
            let avgOEE365 = filtered.length ? filtered.reduce((s,r) => s + (r.oee_365 || 0), 0) / filtered.length : 0;
            let totalOutput = filtered.reduce((s,r) => s + (r.actual_output || 0), 0);
            let machines = [...new Set(filtered.map(r => r.machine_name).filter(Boolean))];
            let pics = [...new Set(filtered.map(r => r.pic).filter(Boolean))];
            
            return `<div class="container-main">
                <div class="card">
                    <div class="card-header">🔍 Filter Data</div>
                    <div class="filter-section">
                        <div><label class="label">Start Date</label><input type="date" id="filter-start-date" value="${filters.startDate}" class="input-field" onchange="updateFilter('startDate',this.value)"></div>
                        <div><label class="label">End Date</label><input type="date" id="filter-end-date" value="${filters.endDate}" class="input-field" onchange="updateFilter('endDate',this.value)"></div>
                        <div><label class="label">Shift</label><select id="filter-shift" class="input-field" onchange="updateFilter('shift',this.value)"><option value="all">All Shifts</option>${Object.keys(SHIFTS).map(s => `<option ${filters.shift === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
                        <div><label class="label">Machine</label><select id="filter-machine" class="input-field" onchange="updateFilter('machine',this.value)"><option value="all">All Machines</option>${machines.map(m => `<option ${filters.machine === m ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
                        <div><label class="label">PIC</label><select id="filter-pic" class="input-field" onchange="updateFilter('pic',this.value)"><option value="all">All Operators</option>${pics.map(p => `<option ${filters.pic === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
                    </div>
                </div>
                
                <div class="grid-4">
                    <div class="scorecard ${oeeActualAvg >= 88 ? 'good' : 'bad'}">
                        <div class="scorecard-label">Average OEE Actual</div>
                        <div class="scorecard-value">${oeeActualAvg.toFixed(1)}%</div>
                        <div style="font-size: 11px;">Target: 88%</div>
                    </div>
                    <div class="scorecard ${avgOEE365 >= 55 ? 'good' : 'bad'}">
                        <div class="scorecard-label">Average OEE 365</div>
                        <div class="scorecard-value">${avgOEE365.toFixed(1)}%</div>
                        <div style="font-size: 11px;">Target: 55%</div>
                    </div>
                    <div class="scorecard">
                        <div class="scorecard-label">Total Output</div>
                        <div class="scorecard-value">${totalOutput.toLocaleString()}</div>
                        <div style="font-size: 11px;">${filtered.length} Records</div>
                    </div>
                    <div class="scorecard">
                        <div class="scorecard-label">Jumlah Mesin Aktif</div>
                        <div class="scorecard-value">${allMachines.length}</div>
                        <div style="font-size: 11px;">Total Machines</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">📈 OEE per Hari</div>
                    <div class="chart-container"><canvas id="daily-oee-chart"></canvas></div>
                </div>
                
                <div class="grid-2">
                    <div class="card"><div class="card-header">📈 AVG OEE per Bulan</div><div class="chart-container"><canvas id="chart-trend"></canvas></div></div>
                    <div class="card"><div class="card-header">🎯 OEE per Machine</div><div class="chart-container"><canvas id="chart-per-machine"></canvas></div></div>
                </div>
                
                <div class="grid-2">
                    <div class="card"><div class="card-header">📊 A-P-Q-A365 Breakdown</div><div class="chart-container"><canvas id="chart-apq"></canvas></div></div>
                    <div class="card"><div class="card-header">⏱️ ODT Top 10 (menit)</div><div class="chart-container"><canvas id="chart-odt"></canvas></div></div>
                </div>
                
                <div class="card">
                    <div class="card-header">📋 OEE History <span style="font-size:12px;">(klik baris untuk detail)</span></div>
                    <div class="table-wrapper">
                         <table>
                            <thead> <tr><th>Date</th><th>Shift</th><th>Machine</th><th>PIC</th><th>Output</th><th>A%</th><th>P%</th><th>Q%</th><th>OEE</th></tr> </thead>
                            <tbody>${filtered.slice(0, 30).map(r => `<tr class="clickable-row" onclick='showRecordDetail(${JSON.stringify(r).replace(/'/g, "\\'")})'>
                                <td class="wrap-text">${new Date(r.date).toLocaleDateString('id-ID')}</td>
                                <td class="wrap-text">${r.shift}</td>
                                <td class="wrap-text">${r.machine_name}</td>
                                <td class="wrap-text">${r.pic}</td>
                                <td class="wrap-text">${(r.actual_output || 0).toLocaleString()}</td>
                                <td class="${(r.availability_actual||0)>=93?'status-good':'status-bad'}">${(r.availability_actual||0).toFixed(1)}%</td>
                                <td class="${(r.performance||0)>=98?'status-good':'status-bad'}">${(r.performance||0).toFixed(1)}%</td>
                                <td class="${(r.quality||0)>=99?'status-good':'status-bad'}">${(r.quality||0).toFixed(1)}%</td>
                                <td class="${(r.oee_actual||0)>=88?'status-good':'status-bad'}">${(r.oee_actual||0).toFixed(1)}%</td>
                            </tr>`).join('') || '<tr><td colspan="9" style="text-align:center">Tidak ada data</td></tr>'}</tbody>
                         </table>
                    </div>
                </div>
            </div>`;
        }

        function showRecordDetail(r) {
            let odt = safeJSONParse(r.odt_data), lsm = safeJSONParse(r.line_stop_mesin_data), lsnm = safeJSONParse(r.line_stop_non_mesin_data);
            let modal = `<div><h3 style="font-size:20px;margin-bottom:16px">📋 Detail OEE - ${r.machine_name} (${new Date(r.date).toLocaleDateString()})</h3>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px">
                <div><strong>Shift:</strong> ${r.shift}</div><div><strong>PIC:</strong> ${r.pic}</div>
                <div><strong>Batch:</strong> ${r.batch_number||'-'}</div><div><strong>Output:</strong> ${r.actual_output} | Reject: ${r.reject}</div>
            </div>
            <div style="background:var(--bg-secondary);padding:16px;border-radius:12px;margin-bottom:16px">
                <strong>OEE: ${(r.oee_actual||0).toFixed(1)}%</strong> | A: ${(r.availability_actual||0).toFixed(1)}% | P: ${(r.performance||0).toFixed(1)}% | Q: ${(r.quality||0).toFixed(1)}%
            </div>
            <div><strong>ODT:</strong><ul>${odt.filter(o=>o.checked).map(o=>`<li>${o.name}: ${Math.min(o.actualTime||0,o.standardTime)}/${o.standardTime} min</li>`).join('')||'<li>-</li>'}</ul></div>
            <div><strong>Line Stop Mesin:</strong><ul>${lsm.map(l=>`<li>${l.item}: ${l.duration} min</li>`).join('')||'<li>-</li>'}</ul></div>
            <div><strong>Line Stop Non Mesin:</strong><ul>${lsnm.map(l=>`<li>${l.item}: ${l.duration} min</li>`).join('')||'<li>-</li>'}</ul></div>
            <button class="btn btn-primary mt-4" onclick="closeModal()">Tutup</button></div>`;
            let mDiv = document.createElement('div'); mDiv.className = 'modal-overlay'; mDiv.innerHTML = `<div class="modal-content">${modal}</div>`; mDiv.onclick = e => { if(e.target === mDiv) closeModal(); }; document.body.appendChild(mDiv);
        }

        function renderDailyChart(records) {
            let ctx = document.getElementById('daily-oee-chart'); if(!ctx) return;
            let dailyMap = new Map();
            records.forEach(r => { if(r.date && r.oee_actual) { let existing = dailyMap.get(r.date) || { total:0, count:0 }; existing.total += r.oee_actual; existing.count++; dailyMap.set(r.date, existing); } });
            let sortedDates = Array.from(dailyMap.keys()).sort((a,b)=>new Date(a)-new Date(b));
            let dailyAvg = sortedDates.map(d => dailyMap.get(d).total / dailyMap.get(d).count);
            let labels = sortedDates.map(d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit'}));
            if(chartInstances.daily) chartInstances.daily.destroy();
            chartInstances.daily = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'OEE Actual (%)', data:dailyAvg, borderColor:'#667eea', backgroundColor:'rgba(102,125,234,0.1)', tension:0.3, fill:true, pointBackgroundColor:dailyAvg.map(v=>v>=88?'#10b981':'#ef4444'), pointRadius:5 }] }, options:{ responsive:true, maintainAspectRatio:false, layout:{ padding:{ top:35, bottom:15, left:10, right:10 } }, scales:{ y:{ beginAtZero:true, max:100, title:{display:true, text:'OEE (%)'} }, x:{ ticks:{ maxRotation:45, minRotation:45 } } }, plugins:{ tooltip:{callbacks:{label:(ctx)=>`OEE: ${ctx.raw.toFixed(1)}%`}}, datalabels:{ anchor: function(context) { return context.dataset.data[context.dataIndex] >= 88 ? 'start' : 'end'; }, align: function(context) { return context.dataset.data[context.dataIndex] >= 88 ? 'bottom' : 'top'; }, offset: 8, formatter:(v)=>v!==null?v.toFixed(1)+'%':'', font:{weight:'bold',size:10}, color:'#333', backgroundColor:'rgba(255,255,255,0.8)', padding:{left:4,right:4,top:2,bottom:2}, borderRadius:4 } } } });
        }

        function renderTrendChart() {
            let ctx = document.getElementById('chart-trend'); if(!ctx) return;
            let year = new Date().getFullYear(), months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            let monthly = Array(12).fill().map(()=>[]);

            let avg = monthly.map(arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null);
            if(chartInstances.trend) chartInstances.trend.destroy();
            chartInstances.trend = new Chart(ctx, { type:'line', data:{ labels:months, datasets:[{ label:`Rata-rata OEE ${year}`, data:avg, borderColor:'#667eea', backgroundColor:'rgba(102,125,234,0.1)', tension:0.4, fill:true, pointBackgroundColor:avg.map(v=>v&&v>=88?'#10b981':'#ef4444'), pointRadius:5 }] }, options:{ responsive:true, maintainAspectRatio:false, layout:{ padding:{ top:35, bottom:15, left:10, right:10 } }, scales:{ y:{ beginAtZero:true, max:100, title:{display:true, text:'OEE (%)'} } }, plugins:{ datalabels:{ anchor: function(context) { return context.dataset.data[context.dataIndex] >= 88 ? 'start' : 'end'; }, align: function(context) { return context.dataset.data[context.dataIndex] >= 88 ? 'bottom' : 'top'; }, offset: 8, formatter:(v)=>v!==null?v.toFixed(1)+'%':'', font:{weight:'bold',size:10}, color:'#333', backgroundColor:'rgba(255,255,255,0.8)', padding:{left:4,right:4,top:2,bottom:2}, borderRadius:4 } } } });
        }
        
        function renderPerMachineChart(records) { 
            let ctx = document.getElementById('chart-per-machine'); if(!ctx) return;
            let stats = {}; records.forEach(r=>{ if(r.machine_name){ if(!stats[r.machine_name]) stats[r.machine_name]={t:0,c:0}; stats[r.machine_name].t+=r.oee_actual||0; stats[r.machine_name].c++; } });
            let labels = Object.keys(stats), values = labels.map(l=>stats[l].t/stats[l].c);

        }
        
        function renderAPQChart(records) { 
            let ctx = document.getElementById('chart-apq'); if(!ctx) return;
            let avgA = records.length?records.reduce((s,r)=>s+(r.availability_actual||0),0)/records.length:0;
            let avgP = records.length?records.reduce((s,r)=>s+(r.performance||0),0)/records.length:0;
            let avgQ = records.length?records.reduce((s,r)=>s+(r.quality||0),0)/records.length:0;
            let avgA365 = records.length?records.reduce((s,r)=>s+(r.availability_365||0),0)/records.length:0;

        }
        
        function renderODTChart(records) {

        async function saveOEEData(isUpdate=false){ let date=document.getElementById('input-date')?.value, shift=document.getElementById('input-shift')?.value, machineId=document.getElementById('input-machine')?.value, pic=document.getElementById('input-pic')?.value.toUpperCase()||'', product=document.getElementById('input-product')?.value.toUpperCase()||'', batch=document.getElementById('input-batch')?.value.toUpperCase()||'', output=parseFloat(document.getElementById('input-output')?.value)||0, reject=parseFloat(document.getElementById('input-reject')?.value)||0, notes=document.getElementById('input-notes')?.value||''; if(!date||!shift||!machineId||!pic||!product||!batch){ showToast('Isi semua field wajib','error'); return; } let odtData=[], lsmData=[], lsnmData=[], msData=[], msCount=0; if(currentMachineDetails?.odt) currentMachineDetails.odt.forEach(o=>{ let cb=document.getElementById(`odt-check-${o.id}`); let inp=document.getElementById(`odt-time-${o.id}`); odtData.push({ name:o.odt_name, standardTime:o.standard_time, actualTime:inp?.value||0, checked:cb?.checked||false }); }); if(currentMachineDetails?.lineStopMesin) currentMachineDetails.lineStopMesin.forEach(ls=>{ let cb=document.getElementById(`lsm-check-${ls.id}`); if(cb?.checked){ let dur=parseFloat(document.getElementById(`lsm-duration-${ls.id}`)?.value)||0; lsmData.push({ item:ls.item_name, duration:dur }); } }); if(currentMachineDetails?.lineStopNonMesin) currentMachineDetails.lineStopNonMesin.forEach(ls=>{ let cb=document.getElementById(`lsnm-check-${ls.id}`); if(cb?.checked){ let dur=parseFloat(document.getElementById(`lsnm-duration-${ls.id}`)?.value)||0; lsnmData.push({ item:ls.item_name, duration:dur }); } }); if(currentMachineDetails?.minorStop) currentMachineDetails.minorStop.forEach(ms=>{ let cb=document.getElementById(`ms-check-${ms.id}`); if(cb?.checked){ let freq=parseFloat(document.getElementById(`ms-frequency-${ms.id}`)?.value)||0; if(freq){ msData.push({ item:ms.item_name, frequency:freq }); msCount+=freq; } } }); let shiftMin=SHIFTS[shift]?.minutes||0, target=currentMachineData?.target_per_minute||0; let totalODT=odtData.filter(o=>o.checked).reduce((s,o)=>s+Math.min(o.actualTime||0,o.standardTime),0); let totalLSM=lsmData.reduce((s,l)=>s+(l.duration||0),0); let totalLSNM=lsnmData.reduce((s,l)=>s+(l.duration||0),0); let availTime=shiftMin-totalODT-totalLSM-totalLSNM; if(availTime<0){ showToast('Durasi melebihi jam kerja','error'); return; } let performance=target>0?((output)/(availTime*target))*100:100; let quality=output>0?((output-reject)/output)*100:100; let availActual=availTime>0?((availTime)/(shiftMin-totalODT))*100:0; let oeeActual=(availActual*performance*quality)/10000; let record={ date, shift, shift_minutes:shiftMin, machine_name:currentMachineData.machine_name, machine_id:machineId, pic, product_code:product, batch_number:batch, odt_data:odtData, line_stop_mesin_data:lsmData, line_stop_non_mesin_data:lsnmData, minor_stop_data:msData, minor_stop_count:msCount, actual_output:output, reject, notes, availability_actual:availActual, availability_365:((availTime)/shiftMin)*100, performance, quality, oee_actual:oeeActual, oee_365:((availTime)/shiftMin)*performance*quality/10000 }; showLoading('Menyimpan...'); try{ if(editMode && editingRecordId){ await updateOEERecord(editingRecordId,record); let idx=allOEERecords.findIndex(r=>r.id===editingRecordId); if(idx!==-1) allOEERecords[idx]={...allOEERecords[idx],...record}; showToast('Data diupdate','success'); editMode=false; editingRecordId=null; } else { let saved=await saveOEERecord(record); allOEERecords.unshift(saved); showToast('Data tersimpan','success'); } resetInputForm(); renderApp(); }catch(e){ showToast('Gagal menyimpan','error'); }finally{ hideLoading(); } }
        
        function resetInputForm(){ let fields=['input-date','input-shift','input-machine','input-pic','input-product','input-batch','input-output','input-reject','input-notes']; fields.forEach(id=>{ let el=document.getElementById(id); if(el) el.value=id==='input-date'?new Date().toISOString().split('T')[0]:id==='input-reject'?'0':''; }); let sections=['odt-section','line-stop-mesin-section','line-stop-non-mesin-section','minor-stop-section','calculated-results']; sections.forEach(id=>{ let el=document.getElementById(id); if(el) el.style.display='none'; }); editMode=false; editingRecordId=null; currentMachineData=null; currentMachineDetails=null; showToast('Form reset','success'); }

nput type="checkbox" id="lsnm-check-${ls.id}" onchange="toggleLineStopNonMesin('${ls.id}')"><label>${ls.item_name}</label><div id="lsnm-details-${ls.id}" style="display:none"><input type="number" id="lsnm-duration-${ls.id}" placeholder="Durasi" class="input-field" oninput="updateCalculations()"></div></div>`).join(''); } if(msDiv && currentMachineDetails.minorStop.length){ msDiv.style.display='block'; document.getElementById('minor-stop-list').innerHTML=currentMachineDetails.minorStop.map(ms=>`<div class="checkbox-item"><input type="checkbox" id="ms-check-${ms.id}" onchange="toggleMinorStop('${ms.id}')"><label>${ms.item_name}</label><div id="ms-details-${ms.id}" style="display:none"><input type="number" id="ms-frequency-${ms.id}" placeholder="Frekuensi" class="input-field" oninput="updateCalculations()"></div></div>`).join(''); } updateCalculations(); }

        function confirmDeleteMachine(id,name){ showToast(`Hapus ${name} - Konfirmasi admin`,'info'); }
        
        function renderApp(){ let app=document.getElementById('app-wrapper'); let header=`<div style="background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); padding:24px"><div class="container-main"><h1 style="color:white;font-size:28px;font-weight:900">${defaultConfig.system_title}</h1><p style="color:white">${defaultConfig.company_name}</p><p style="color:white;font-size:12px">${new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p></div></div>`; let nav=`<div class="container-main"><div class="nav-tabs"><button class="nav-tab ${currentPage==='dashboard'?'active':''}" onclick="navigateTo('dashboard')">📊 Dashboard</button><button class="nav-tab ${currentPage==='input'?'active':''}" onclick="navigateTo('input')">✏️ Input</button><button class="nav-tab ${currentPage==='management'?'active':''}" onclick="navigateTo('management')">⚙️ Management</button></div></div>`; let content=''; if(currentPage==='dashboard') content=renderDashboard(); else if(currentPage==='input') content=renderInputPage(); else if(currentPage==='management') content=isManagementUnlocked?renderManagementPage():renderManagementLogin(); app.innerHTML=header+nav+content; if(currentPage==='dashboard') setTimeout(renderCharts,100); }
        
        async function init(){ let theme=localStorage.getItem('oee-theme')||'light'; document.documentElement.setAttribute('data-theme',theme); document.getElementById('theme-toggle-btn').textContent=theme==='dark'?'☀️':'🌙'; await loadMachines(); await loadOEERecords(); renderApp(); setInterval(async()=>{ await loadOEERecords(); if(currentPage==='dashboard') renderCharts(); },3600000); }
        
        window.toggleTheme=toggleTheme; window.navigateTo=navigateTo; window.updateFilter=updateFilter; window.unlockManagement=unlockManagement; window.saveOEEData=saveOEEData; window.resetInputForm=resetInputForm; window.loadMachineData=loadMachineData; window.toggleODT=toggleODT; window.toggleLineStopMesin=toggleLineStopMesin; window.toggleLineStopNonMesin=toggleLineStopNonMesin; window.toggleMinorStop=toggleMinorStop; window.updateCalculations=updateCalculations; window.loadOEERecordForEdit=loadOEERecordForEdit; window.searchEditRecords=searchEditRecords; window.openAddMachineModal=openAddMachineModal; window.editMachine=editMachine; window.confirmDeleteMachine=confirmDeleteMachine; window.showRecordDetail=showRecordDetail; window.cancelEdit=cancelEdit; window.closeModal=closeModal;
        init();
    </script>
</body>
</html>
