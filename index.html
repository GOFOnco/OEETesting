<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Digital Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        html, body, #app-wrapper { height: 100%; width: 100%; }
        #app-wrapper { overflow-y: auto; background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%); transition: background 0.3s ease; }
        .theme-toggle { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; z-index: 1000; }
        .theme-toggle:hover { transform: translateY(-4px) scale(1.05); }
        :root { --bg-primary: #ffffff; --bg-secondary: #f8fafc; --text-primary: #1e293b; --text-secondary: #64748b; --accent-primary: #667eea; --accent-secondary: #764ba2; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #e2e8f0; --gradient-start: #667eea; --gradient-end: #764ba2; }
        [data-theme="dark"] { --bg-primary: #1e293b; --bg-secondary: #0f172a; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --accent-primary: #818cf8; --accent-secondary: #a78bfa; --success: #34d399; --warning: #fbbf24; --danger: #f87171; --border: #334155; --gradient-start: #4c1d95; --gradient-end: #1e1b4b; }
        .container-main { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .card { background: var(--bg-primary); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
        .card-header { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }
        .input-field { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-primary); color: var(--text-primary); }
        .label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
        .scorecard { background: var(--bg-secondary); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border); transition: all 0.3s ease; }
        .scorecard-value { font-size: 36px; font-weight: 900; margin: 8px 0; }
        .scorecard-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .scorecard.good .scorecard-value { color: var(--success); }
        .scorecard.bad .scorecard-value { color: var(--danger); }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; background: var(--bg-primary); padding: 16px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tab { padding: 14px 28px; background: rgba(102,125,234,0.1); border-radius: 12px; font-weight: 700; color: var(--text-primary); cursor: pointer; transition: all 0.3s ease; }
        .nav-tab.active { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; box-shadow: 0 6px 20px rgba(102,125,234,0.4); transform: translateY(-2px); }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; padding: 12px; text-align: left; font-weight: 600; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: var(--bg-secondary); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: var(--bg-primary); border-radius: 16px; padding: 32px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .toast { position: fixed; top: 24px; right: 24px; padding: 16px 24px; border-radius: 12px; color: white; font-weight: 600; z-index: 10000; animation: slideIn 0.3s ease-out; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .spinner { border: 3px solid rgba(102,125,234,0.3); border-radius: 50%; border-top-color: var(--accent-primary); width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; color: white; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .chart-container { position: relative; height: 320px; margin-top: 16px; }
        .clickable-row { cursor: pointer; transition: 0.2s; }
        .clickable-row:hover { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important; color: white; }
        .status-good { color: var(--success); font-weight: 600; }
        .status-bad { color: var(--danger); font-weight: 600; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; background: rgba(102,125,234,0.1); color: var(--accent-primary); }
        .wrap-text { white-space: normal !important; word-break: break-word; }
        .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .target-box { background: linear-gradient(135deg, rgba(102,125,234,0.15), rgba(118,75,162,0.15)); padding: 20px; border-radius: 12px; margin-bottom: 24px; border: 2px solid var(--accent-primary); }
        .detail-item { background: var(--bg-secondary); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent-primary); margin-bottom: 8px; }
        .edit-mode-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>

        function toggleTheme() { 
            let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; 
            document.documentElement.setAttribute('data-theme', t);

        function showToast(msg, type='success') {

        function safeJSONParse(s, d=[]) { 
            try { 
                if(!s) return d; 
                let p = typeof s === 'string' ? JSON.parse(s) : s; 
                return p || d; 
            } catch(e) { 
                return d; 
            } 
        }

        async function loadMachines() { 
            let {data, error} = await db.from('machines').select('*').eq('is_deleted', false).order('created_at', {ascending: false}); 
            if(!error) allMachines = data || []; 
            return allMachines; 
        }
        
        async function loadOEERecords() { 
            let {data, error} = await db.from('oee_records').select('*').order('date', {ascending: false}); 
            if(!error) allOEERecords = data || []; 
            return allOEERecords; 
        }
        
        async function loadMachineDetails(id) { 
            let [odt, lsm, lsnm, ms] = await Promise.all([
                db.from('machine_odt').select('*').eq('machine_id', id), 
                db.from('machine_line_stop_mesin').select('*').eq('machine_id', id), 
                db.from('machine_line_stop_non_mesin').select('*').eq('machine_id', id),

            ]); 
            return { odt: odt.data || [], lineStopMesin: lsm.data || [], lineStopNonMesin: lsnm.data || [], minorStop: ms.data || [] }; 
        }
        
        async function saveOEERecord(d) { 
            let clean = {...d, odt_data: JSON.stringify(d.odt_data || []), line_stop_mesin_data: JSON.stringify(d.line_stop_mesin_data || []), line_stop_non_mesin_data: JSON.stringify(d.line_stop_non_mesin_data || []), minor_stop_data: JSON.stringify(d.minor_stop_data || [])}; 
            let {data, error} = await db.from('oee_records').insert([clean]).select().single(); 
            if(error) throw error; 
            return data; 
        }
        
        async function updateOEERecord(id, d) { 
            let clean = {...d, odt_data: JSON.stringify(d.odt_data || []), line_stop_mesin_data: JSON.stringify(d.line_stop_mesin_data || []), line_stop_non_mesin_data: JSON.stringify(d.line_stop_non_mesin_data || []), minor_stop_data: JSON.stringify(d.minor_stop_data || [])}; 
            let {data, error} = await db.from('oee_records').update(clean).eq('id', id).select().single(); 
            if(error) throw error; 
            return data; 
        }

        function getFilteredRecords() {
            let rec = allOEERecords.filter(r => { 
                if(!r.date) return false; 
                let d = new Date(r.date), s = new Date(filters.startDate), e = new Date(filters.endDate); 
                return d >= s && d <= e && (filters.shift === 'all' || r.shift === filters.shift) && (filters.machine === 'all' || r.machine_name === filters.machine) && (filters.pic === 'all' || r.pic === filters.pic); 
            });
            if(filters.detailLineStopItem !== 'all') {
                rec = rec.filter(r => { 
                    let m = false; 
                    if(filters.detailLineStopType === 'mesin') { 
                        let d = safeJSONParse(r.line_stop_mesin_data); 
                        m = d.some(l => l.item === filters.detailLineStopItem); 
                    } 
                    if(filters.detailLineStopType === 'non_mesin') { 
                        let d = safeJSONParse(r.line_stop_non_mesin_data); 
                        m = d.some(l => l.item === filters.detailLineStopItem); 
                    } 
                    return m; 
                });
            }
            return rec;
        }

        function calculateOEE(formData) {
            const shiftMinutes = SHIFTS[formData.shift]?.minutes || 0;
            const targetPerMinute = formData.targetPerMinute || 0;
            
            let totalODT = 0;
            let odtExceeds = [];
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        if (actualTime <= standardTime) {
                            totalODT += actualTime;
                        } else {
                            totalODT += standardTime;
                            odtExceeds.push({ item: `ODT Exceed - ${odt.name}`, duration: actualTime - standardTime, action: 'Auto-generated from ODT exceed' });
                        }
                    }
                });
            }
            let totalLineStopMesin = (formData.lineStopMesinData || []).reduce((s,l) => s + parseFloat(l.duration || 0), 0);
            let totalLineStopNonMesin = (formData.lineStopNonMesinData || []).reduce((s,l) => s + parseFloat(l.duration || 0), 0);
            odtExceeds.forEach(ex => totalLineStopNonMesin += ex.duration);
            
            const availabilityActual = shiftMinutes - totalODT > 0 ? ((shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin) / (shiftMinutes - totalODT)) * 100 : 0;
            const availability365 = shiftMinutes > 0 ? ((shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin) / shiftMinutes) * 100 : 0;
            
            let performance = 100;
            if (targetPerMinute > 0) {
                const availableTime = shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin;
                const idealOutput = availableTime * targetPerMinute;
                performance = idealOutput > 0 ? (formData.actualOutput / idealOutput) * 100 : 0;
            }
            let quality = 100;
            if (targetPerMinute > 0 && formData.actualOutput > 0) {
                quality = ((formData.actualOutput - formData.reject) / formData.actualOutput) * 100;
            }
            const oeeActual = (availabilityActual * performance * quality) / 10000;
            const oee365 = (availability365 * performance * quality) / 10000;
            
            return { 
                availabilityActual: Math.max(0, Math.min(100, availabilityActual)), 
                availability365: Math.max(0, Math.min(100, availability365)), 
                performance: Math.max(0, Math.min(100, performance)), 
                quality: Math.max(0, Math.min(100, quality)), 
                oeeActual: Math.max(0, Math.min(100, oeeActual)), 
                oee365: Math.max(0, Math.min(100, oee365)), 
                totalODT, totalLineStopMesin, totalLineStopNonMesin, odtExceeds, 
                remainingTime: shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin, 
                shiftMinutes 
            };
        }

        function renderDashboard() {
            let filtered = getFilteredRecords();
            let avgA = filtered.length ? filtered.reduce((s,r) => s + (r.availability_actual || 0), 0) / filtered.length : 0;
            let avgP = filtered.length ? filtered.reduce((s,r) => s + (r.performance || 0), 0) / filtered.length : 0;
            let avgQ = filtered.length ? filtered.reduce((s,r) => s + (r.quality || 0), 0) / filtered.length : 0;
            let oeeActualAvg = (avgA * avgP * avgQ) / 10000;
            let avgOEE365 = filtered.length ? filtered.reduce((s,r) => s + (r.oee_365 || 0), 0) / filtered.length : 0;

                        <div><label class="label">Shift</label><select id="filter-shift" class="input-field" onchange="updateFilter('shift',this.value)"><option value="all">All Shifts</option>${Object.keys(SHIFTS).map(s => `<option ${filters.shift === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
                        <div><label class="label">Machine</label><select id="filter-machine" class="input-field" onchange="updateFilter('machine',this.value)"><option value="all">All Machines</option>${machines.map(m => `<option ${filters.machine === m ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
                        <div><label class="label">PIC / Operator</label><select id="filter-pic" class="input-field" onchange="updateFilter('pic',this.value)"><option value="all">All Operators</option>${pics.map(p => `<option ${filters.pic === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
                    </div>
                    <div style="margin-top: 12px; padding: 12px; background: rgba(102,125,234,0.1); border-radius: 8px;">
                        <span>📅 Menampilkan data dari <strong>${startDateDisplay}</strong> hingga <strong>${endDateDisplay}</strong> (${filtered.length} records)</span>
                    </div>
                </div>
                
                <div class="grid-4">
                    <div class="scorecard ${oeeActualAvg >= 88 ? 'good' : 'bad'}">
                        <div class="scorecard-label">Average OEE Actual</div>
                        <div class="scorecard-value">${oeeActualAvg.toFixed(1)}%</div>
                        <div style="font-size: 11px;">Target: 88%</div>
                    </div>
                    <div class="scorecard ${avgOEE365 >= 55 ? 'good' : 'bad'}">
                        <div class="scorecard-label">Average OEE 365</div>
                        <div class="scorecard-value">${avgOEE365.toFixed(1)}%</div>
                        <div style="font-size: 11px;">Target: 55%</div>
                    </div>
                    <div class="scorecard">
                        <div class="scorecard-label">Total Output</div>
                        <div class="scorecard-value">${totalOutput.toLocaleString()}</div>
                        <div style="font-size: 11px;">${filtered.length} Records</div>
                    </div>
                    <div class="scorecard">
                        <div class="scorecard-label">Jumlah Mesin Aktif</div>
                        <div class="scorecard-value">${allMachines.length}</div>
                        <div style="font-size: 11px;">Total Machines</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">📈 OEE per Hari (Periode Filter)</div>
                    <div class="chart-container">
                        <canvas id="daily-oee-chart"></canvas>
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="card">

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Date</th><th>Shift</th><th>Machine</th><th>PIC</th><th>Batch</th><th>Output</th><th>Reject</th><th>A%</th><th>P%</th><th>Q%</th><th>OEE Actual</th><th>Notes</th></tr>
                            </thead>
                            <tbody>
                                ${filtered.slice(0, 50).map(r => `
                                    <tr class="clickable-row" onclick='showRecordDetail(${JSON.stringify(r).replace(/'/g, "\\'")})'>
                                        <td class="wrap-text">${new Date(r.date).toLocaleDateString('id-ID')}</td>

        function renderDailyChart(records) {
            let ctx = document.getElementById('daily-oee-chart');
            if(!ctx) return;
            
            let dailyMap = new Map();
            records.forEach(r => { 
                if(r.date && r.oee_actual) {
                    let dateKey = r.date;
                    if(!dailyMap.has(dateKey)) {
                        dailyMap.set(dateKey, { total: 0, count: 0 });
                    }
                    let existing = dailyMap.get(dateKey);
                    existing.total += r.oee_actual;
                    existing.count += 1;
                    dailyMap.set(dateKey, existing);
                }
            });
            
            let sortedDates = Array.from(dailyMap.keys()).sort((a,b) => new Date(a) - new Date(b));
            let dailyAvg = sortedDates.map(d => dailyMap.get(d).total / dailyMap.get(d).count);
            let dailyLabels = sortedDates.map(d => new Date(d).toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit' }));
            
            if(chartInstances.daily) chartInstances.daily.destroy();
            
            chartInstances.daily = new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: dailyLabels, 
                    datasets: [{
                        label: 'OEE Actual (%)', 
                        data: dailyAvg, 
                        borderColor: '#667eea', 
                        backgroundColor: 'rgba(102,125,234,0.1)', 
                        tension: 0.3, 
                        fill: true,
                        pointBackgroundColor: dailyAvg.map(v => v >= 88 ? '#10b981' : '#ef4444'), 
                        pointBorderColor: '#fff',
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }] 
                }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    layout: { padding: { top: 25, bottom: 10, left: 10, right: 10 } },
                    scales: { 
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'OEE (%)' } }, 
                        x: { title: { display: true, text: 'Tanggal' }, ticks: { maxRotation: 45, minRotation: 45 } }
                    }, 
                    plugins: { 
                        tooltip: { callbacks: { label: (ctx) => `OEE: ${ctx.raw.toFixed(1)}%` } },
                        legend: { position: 'top' },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            offset: 4,
                            formatter: (value, context) => {
                                return value !== null ? value.toFixed(1) + '%' : '';
                            },
                            font: { weight: 'bold', size: 10 },
                            color: '#333'
                        }
                    } 
                } 
            });
        }

        function renderTrendChart() {
            let ctx = document.getElementById('chart-trend');
            if(!ctx) return;
            let year = new Date().getFullYear();
            let months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            let monthly = Array(12).fill().map(() => []);
            
            allOEERecords.forEach(r => { 
                if(r.date && new Date(r.date).getFullYear() === year && 
                   (filters.shift === 'all' || r.shift === filters.shift) && 
                   (filters.machine === 'all' || r.machine_name === filters.machine) && 
                   (filters.pic === 'all' || r.pic === filters.pic)) {
                    monthly[new Date(r.date).getMonth()].push(r.oee_actual || 0);
                }
            });
            
            let avg = monthly.map(arr => arr.length ? arr.reduce((a,b) => a+b, 0)/arr.length : null);
            
            if(chartInstances.trend) chartInstances.trend.destroy();
            chartInstances.trend = new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: months, 
                    datasets: [{ 
                        label: `Rata-rata OEE ${year}`, 
                        data: avg, 
                        borderColor: '#667eea', 
                        backgroundColor: 'rgba(102,125,234,0.1)', 
                        tension: 0.4, 
                        fill: true,
                        pointBackgroundColor: avg.map(v => v && v >= 88 ? '#10b981' : '#ef4444'),

                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    layout: { padding: { top: 25, bottom: 10, left: 10, right: 10 } },

                    plugins: { 
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            offset: 4,
                            formatter: (value, context) => {
                                return value !== null ? value.toFixed(1) + '%' : '';
                            },

                            color: '#333'
                        }
                    }
                }

        function renderPerMachineChart(records) { 
            let ctx = document.getElementById('chart-per-machine'); 
            if(!ctx) return; 
            let stats = {}; 
            records.forEach(r => { 
                if(r.machine_name) { 
                    if(!stats[r.machine_name]) stats[r.machine_name] = { t: 0, c: 0 }; 
                    stats[r.machine_name].t += r.oee_actual || 0; 
                    stats[r.machine_name].c++; 
                } 
            }); 
            let labels = Object.keys(stats); 
            let values = labels.map(l => stats[l].t / stats[l].c); 
            if(chartInstances.perMachine) chartInstances.perMachine.destroy(); 
            chartInstances.perMachine = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels, 
                    datasets: [{ 
                        label: 'Avg OEE Actual', 
                        data: values, 
                        backgroundColor: values.map(v => v >= 88 ? '#10b981' : '#ef4444'),
                        borderRadius: 8

                options: {

                    maintainAspectRatio: false,
                    layout: { padding: { top: 30, bottom: 10, left: 10, right: 10 } },

                            color: '#333'
                        }
                    }

            });

        function renderODTChart(records) { 
            let ctx = document.getElementById('chart-odt'); 
            if(!ctx) return; 
            let odtMap = {}; 
            records.forEach(r => { 
                let odt = safeJSONParse(r.odt_data); 
                odt.forEach(o => { 
                    if(o.checked) { 
                        let t = Math.min(o.actualTime || 0, o.standardTime || 0); 
                        if(t > 0) odtMap[o.name] = (odtMap[o.name] || 0) + t; 
                    } 
                }); 
            }); 
            let sorted = Object.entries(odtMap).sort((a,b) => b[1] - a[1]).slice(0, 10); 
            if(chartInstances.odt) chartInstances.odt.destroy(); 
            if(sorted.length === 0) return;
            chartInstances.odt = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels: sorted.map(s => s[0]), 
                    datasets: [{ label: 'Total Minutes', data: sorted.map(s => s[1]), backgroundColor: '#f59e0b', borderRadius: 8 }] 
                }, 
                options: { 
                    indexAxis: 'y', 
                    responsive: true, 
                    maintainAspectRatio: false,

                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)} menit` } },

                            align: 'right',
                            offset: 4,
                            formatter: (value) => value.toFixed(0),
                            font: { weight: 'bold', size: 10 },
                            color: '#333'
                        }
                    } 
                } 
            }); 
        }

        async function loadOEERecordForEdit(id) { 
            let rec = allOEERecords.find(r => r.id === id); 
            if(!rec) return; 
            editMode = true; 
            editingRecordId = id; 
            currentPage = 'input'; 
            renderApp(); 
            setTimeout(async() => { 
                let dateInp = document.getElementById('input-date');
                let shiftSel = document.getElementById('input-shift');
                let machineSel = document.getElementById('input-machine');
                if(dateInp) dateInp.value = rec.date;
                if(shiftSel) shiftSel.value = rec.shift;
                if(machineSel) machineSel.value = rec.machine_id;
                await loadMachineData();
                let picInp = document.getElementById('input-pic');
                let productInp = document.getElementById('input-product');
                let batchInp = document.getElementById('input-batch');
                let outputInp = document.getElementById('input-output');
                let rejectInp = document.getElementById('input-reject');
                if(picInp) picInp.value = rec.pic || '';
                if(productInp) productInp.value = rec.product_code || '';
                if(batchInp) batchInp.value = rec.batch_number || '';
                if(outputInp) outputInp.value = rec.actual_output || 0;
                if(rejectInp) rejectInp.value = rec.reject || 0;
                let odt = safeJSONParse(rec.odt_data);
                if(currentMachineDetails?.odt) {
                    currentMachineDetails.odt.forEach(o => { 
                        let saved = odt.find(d => d.name === o.odt_name); 
                        if(saved?.checked) { 
                            let cb = document.getElementById(`odt-check-${o.id}`); 
                            if(cb) { 
                                cb.checked = true; 
                                let inp = document.getElementById(`odt-time-${o.id}`); 
                                if(inp) { 
                                    inp.disabled = false; 
                                    inp.value = saved.actualTime; 
                                } 
                                toggleODT(o.id); 
                            } 
                        } 
                    });
                }
                updateCalculations();
            }, 300);
        }
        
        async function saveOEEData(isUpdate = false) { 
            let date = document.getElementById('input-date')?.value;
            let shift = document.getElementById('input-shift')?.value;
            let machineId = document.getElementById('input-machine')?.value;
            let pic = document.getElementById('input-pic')?.value.toUpperCase() || '';
            let product = document.getElementById('input-product')?.value.toUpperCase() || '';
            let batch = document.getElementById('input-batch')?.value.toUpperCase() || '';
            let output = parseFloat(document.getElementById('input-output')?.value) || 0;
            let reject = parseFloat(document.getElementById('input-reject')?.value) || 0;
            let notes = document.getElementById('input-notes')?.value || '';
            
            if(!date || !shift || !machineId || !pic || !product || !batch) { 
                showToast('Isi semua field wajib (Tanggal, Shift, Machine, PIC, Product, Batch)', 'error'); 
                return; 
            }
            
            let odtData = [], lsmData = [], lsnmData = [], msData = [], msCount = 0;
            
            if(currentMachineDetails?.odt) {
                currentMachineDetails.odt.forEach(o => { 
                    let cb = document.getElementById(`odt-check-${o.id}`); 
                    let inp = document.getElementById(`odt-time-${o.id}`); 
                    odtData.push({ name: o.odt_name, standardTime: o.standard_time, actualTime: inp?.value || 0, checked: cb?.checked || false }); 
                });
            }
            if(currentMachineDetails?.lineStopMesin) {
                currentMachineDetails.lineStopMesin.forEach(ls => { 
                    let cb = document.getElementById(`lsm-check-${ls.id}`); 
                    if(cb?.checked) { 
                        let dur = parseFloat(document.getElementById(`lsm-duration-${ls.id}`)?.value) || 0; 
                        lsmData.push({ item: ls.item_name, duration: dur, action: document.getElementById(`lsm-action-${ls.id}`)?.value || '' }); 
                    } 
                });
            }
            if(currentMachineDetails?.lineStopNonMesin) {
                currentMachineDetails.lineStopNonMesin.forEach(ls => { 
                    let cb = document.getElementById(`lsnm-check-${ls.id}`); 
                    if(cb?.checked) { 
                        let dur = parseFloat(document.getElementById(`lsnm-duration-${ls.id}`)?.value) || 0; 
                        lsnmData.push({ item: ls.item_name, duration: dur, action: document.getElementById(`lsnm-action-${ls.id}`)?.value || '' }); 
                    } 
                });
            }
            if(currentMachineDetails?.minorStop) {
                currentMachineDetails.minorStop.forEach(ms => { 
                    let cb = document.getElementById(`ms-check-${ms.id}`); 
                    if(cb?.checked) { 
                        let freq = parseFloat(document.getElementById(`ms-frequency-${ms.id}`)?.value) || 0; 
                        if(freq) { 
                            msData.push({ item: ms.item_name, frequency: freq }); 
                            msCount += freq; 
                        } 
                    } 
                });
            }
            
            let shiftMin = SHIFTS[shift]?.minutes || 0;
            let target = currentMachineData?.target_per_minute || 0;
            let totalODT = odtData.filter(o => o.checked).reduce((s,o) => s + Math.min(o.actualTime || 0, o.standardTime), 0);
            let totalLSM = lsmData.reduce((s,l) => s + (l.duration || 0), 0);
            let totalLSNM = lsnmData.reduce((s,l) => s + (l.duration || 0), 0);
            let availTime = shiftMin - totalODT - totalLSM - totalLSNM;
            
            if(availTime < 0) { 
                showToast('Total durasi kegiatan melebihi jam kerja, cek kembali data availability anda.', 'error'); 
                return; 
            }
            
            let performance = target > 0 ? ((output) / (availTime * target)) * 100 : 100;
            let quality = output > 0 ? ((output - reject) / output) * 100 : 100;
            let availActual = availTime > 0 ? ((availTime) / (shiftMin - totalODT)) * 100 : 0;
            let oeeActual = (availActual * performance * quality) / 10000;
            
            let record = { 
                date, shift, shift_minutes: shiftMin, machine_name: currentMachineData.machine_name, machine_id: machineId, pic, product_code: product, batch_number: batch,
                odt_data: odtData, line_stop_mesin_data: lsmData, line_stop_non_mesin_data: lsnmData, minor_stop_data: msData, minor_stop_count: msCount,
                actual_output: output, reject, notes,
                availability_actual: availActual, availability_365: ((availTime) / shiftMin) * 100, performance, quality, oee_actual: oeeActual, oee_365: ((availTime) / shiftMin) * performance * quality / 10000
            };
            
            showLoading('Menyimpan...');
            try { 
                if(editMode && editingRecordId) { 
                    await updateOEERecord(editingRecordId, record); 
                    let idx = allOEERecords.findIndex(r => r.id === editingRecordId); 
                    if(idx !== -1) allOEERecords[idx] = { ...allOEERecords[idx], ...record }; 
                    showToast('Data berhasil diupdate', 'success'); 
                    editMode = false; 
                    editingRecordId = null; 
                } else { 
                    let saved = await saveOEERecord(record); 
                    allOEERecords.unshift(saved); 
                    showToast('Data berhasil disimpan', 'success'); 
                } 
                resetInputForm(); 
                renderApp(); 
            } catch(e) { 
                showToast('Gagal menyimpan: ' + e.message, 'error'); 
            } finally { 
                hideLoading(); 
            } 
        }
        
        function resetInputForm() { 
            let dateInp = document.getElementById('input-date');
            let shiftSel = document.getElementById('input-shift');
            let machineSel = document.getElementById('input-machine');
            let picInp = document.getElementById('input-pic');
            let productInp = document.getElementById('input-product');
            let batchInp = document.getElementById('input-batch');
            let outputInp = document.getElementById('input-output');
            let rejectInp = document.getElementById('input-reject');
            let notesInp = document.getElementById('input-notes');
            
            if(dateInp) dateInp.value = new Date().toISOString().split('T')[0];
            if(shiftSel) shiftSel.value = '';
            if(machineSel) machineSel.value = '';
            if(picInp) picInp.value = '';
            if(productInp) productInp.value = '';
            if(batchInp) batchInp.value = '';
            if(outputInp) outputInp.value = '';
            if(rejectInp) rejectInp.value = '0';
            if(notesInp) notesInp.value = '';
            
            let odtDiv = document.getElementById('odt-section');
            let lsmDiv = document.getElementById('line-stop-mesin-section');
            let lsnmDiv = document.getElementById('line-stop-non-mesin-section');
            let msDiv = document.getElementById('minor-stop-section');
            let resultsDiv = document.getElementById('calculated-results');
            
            if(odtDiv) odtDiv.style.display = 'none';
            if(lsmDiv) lsmDiv.style.display = 'none';
            if(lsnmDiv) lsnmDiv.style.display = 'none';
            if(msDiv) msDiv.style.display = 'none';
            if(resultsDiv) resultsDiv.style.display = 'none';
            
            editMode = false;
            editingRecordId = null;
            currentMachineData = null;
            currentMachineDetails = null;
            showToast('Form direset', 'success');
        }
        
        async function loadMachineData() { 
            let mid = document.getElementById('input-machine')?.value; 
            if(!mid) { 
                let odtDiv = document.getElementById('odt-section');
                let lsmDiv = document.getElementById('line-stop-mesin-section');
                let lsnmDiv = document.getElementById('line-stop-non-mesin-section');
                let msDiv = document.getElementById('minor-stop-section');
                if(odtDiv) odtDiv.style.display = 'none';
                if(lsmDiv) lsmDiv.style.display = 'none';
                if(lsnmDiv) lsnmDiv.style.display = 'none';
                if(msDiv) msDiv.style.display = 'none';
                return; 
            } 
            currentMachineData = allMachines.find(m => m.id === mid); 
            currentMachineDetails = await loadMachineDetails(mid); 
            
            let odtDiv = document.getElementById('odt-section');
            let lsmDiv = document.getElementById('line-stop-mesin-section');
            let lsnmDiv = document.getElementById('line-stop-non-mesin-section');
            let msDiv = document.getElementById('minor-stop-section');
            let odtList = document.getElementById('odt-list');
            let lsmList = document.getElementById('line-stop-mesin-list');
            let lsnmList = document.getElementById('line-stop-non-mesin-list');
            let msList = document.getElementById('minor-stop-list');
            
            if(odtDiv && odtList && currentMachineDetails.odt.length) {
                odtDiv.style.display = 'block';
                odtList.innerHTML = currentMachineDetails.odt.map(o => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="odt-check-${o.id}" onchange="toggleODT('${o.id}')">
                        <label style="flex:1"><strong>${o.odt_name}</strong> <span style="color:var(--text-secondary)">(Standard: ${o.standard_time} min)</span></label>
                        <input type="number" id="odt-time-${o.id}" placeholder="Actual time" class="input-field" style="width:120px" disabled oninput="updateCalculations()">
                    </div>
                `).join('');
            } else if(odtDiv) odtDiv.style.display = 'none';
            
            if(lsmDiv && lsmList && currentMachineDetails.lineStopMesin.length) {
                lsmDiv.style.display = 'block';
                lsmList.innerHTML = currentMachineDetails.lineStopMesin.map(ls => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="lsm-check-${ls.id}" onchange="toggleLineStopMesin('${ls.id}')">
                        <label style="flex:1"><strong>${ls.item_name}</strong></label>
                        <div id="lsm-details-${ls.id}" style="display:none; width:100%">
                            <input type="number" id="lsm-duration-${ls.id}" placeholder="Duration (min)" class="input-field" oninput="updateCalculations()">
                            <input type="text" id="lsm-action-${ls.id}" placeholder="Action" class="input-field" style="margin-top:8px">
                        </div>
                    </div>
                `).join('');
            } else if(lsmDiv) lsmDiv.style.display = 'none';
            
            if(lsnmDiv && lsnmList && currentMachineDetails.lineStopNonMesin.length) {
                lsnmDiv.style.display = 'block';
                lsnmList.innerHTML = currentMachineDetails.lineStopNonMesin.map(ls => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="lsnm-check-${ls.id}" onchange="toggleLineStopNonMesin('${ls.id}')">
                        <label style="flex:1"><strong>${ls.item_name}</strong></label>
                        <div id="lsnm-details-${ls.id}" style="display:none; width:100%">
                            <input type="number" id="lsnm-duration-${ls.id}" placeholder="Duration (min)" class="input-field" oninput="updateCalculations()">
                            <input type="text" id="lsnm-action-${ls.id}" placeholder="Action" class="input-field" style="margin-top:8px">
                        </div>
                    </div>
                `).join('');
            } else if(lsnmDiv) lsnmDiv.style.display = 'none';
            
            if(msDiv && msList && currentMachineDetails.minorStop.length) {
                msDiv.style.display = 'block';
                msList.innerHTML = currentMachineDetails.minorStop.map(ms => `
                    <div class="checkbox-item">
                        <input type="checkbox" id="ms-check-${ms.id}" onchange="toggleMinorStop('${ms.id}')">
                        <label style="flex:1"><strong>${ms.item_name}</strong></label>
                        <div id="ms-details-${ms.id}" style="display:none; width:100%">
                            <input type="number" id="ms-frequency-${ms.id}" placeholder="Frequency (kali)" class="input-field" oninput="updateCalculations()">
                        </div>
                    </div>
                `).join('');
            } else if(msDiv) msDiv.style.display = 'none';
            
            updateCalculations();
        }
        
        function toggleODT(id) { 
            let cb = document.getElementById(`odt-check-${id}`); 
            let inp = document.getElementById(`odt-time-${id}`); 
            if(inp) inp.disabled = !cb.checked; 
            updateCalculations(); 
        }
        
        function toggleLineStopMesin(id) { 
            let d = document.getElementById(`lsm-details-${id}`); 
            if(d) d.style.display = document.getElementById(`lsm-check-${id}`).checked ? 'block' : 'none'; 
            updateCalculations(); 
        }
        
        function toggleLineStopNonMesin(id) { 
            let d = document.getElementById(`lsnm-details-${id}`); 
            if(d) d.style.display = document.getElementById(`lsnm-check-${id}`).checked ? 'block' : 'none'; 
            updateCalculations(); 
        }
        
        function toggleMinorStop(id) { 
            let d = document.getElementById(`ms-details-${id}`); 
            if(d) d.style.display = document.getElementById(`ms-check-${id}`).checked ? 'block' : 'none'; 
        }
        
        function updateCalculations() { 
            let shift = document.getElementById('input-shift')?.value; 
            if(!currentMachineData || !shift) return; 
            
            let odtTotal = 0; 
            if(currentMachineDetails?.odt) {
                currentMachineDetails.odt.forEach(o => { 
                    let cb = document.getElementById(`odt-check-${o.id}`); 
                    if(cb?.checked) { 
                        let val = parseFloat(document.getElementById(`odt-time-${o.id}`)?.value) || 0; 
                        odtTotal += Math.min(val, o.standard_time); 
                    } 
                });
            }
            let lsmTotal = 0; 
            if(currentMachineDetails?.lineStopMesin) {
                currentMachineDetails.lineStopMesin.forEach(ls => { 
                    let cb = document.getElementById(`lsm-check-${ls.id}`); 
                    if(cb?.checked) lsmTotal += parseFloat(document.getElementById(`lsm-duration-${ls.id}`)?.value) || 0; 
                });
            }
            let lsnmTotal = 0; 
            if(currentMachineDetails?.lineStopNonMesin) {
                currentMachineDetails.lineStopNonMesin.forEach(ls => { 
                    let cb = document.getElementById(`lsnm-check-${ls.id}`); 
                    if(cb?.checked) lsnmTotal += parseFloat(document.getElementById(`lsnm-duration-${ls.id}`)?.value) || 0; 
                });
            }
            
            let shiftMin = SHIFTS[shift]?.minutes || 0;
            let availTime = shiftMin - odtTotal - lsmTotal - lsnmTotal;
            let target = currentMachineData.target_per_minute || 0;
            let output = parseFloat(document.getElementById('input-output')?.value) || 0;
            let reject = parseFloat(document.getElementById('input-reject')?.value) || 0;
            let performance = target > 0 ? ((output) / (availTime * target)) * 100 : 100;
            let quality = output > 0 ? ((output - reject) / output) * 100 : 100;
            let availActual = availTime > 0 ? ((availTime) / (shiftMin - odtTotal)) * 100 : 0;
            let oeeActual = (availActual * performance * quality) / 10000;
            
            let aActualEl = document.getElementById('calc-a-actual');
            let pEl = document.getElementById('calc-p');
            let qEl = document.getElementById('calc-q');
            let oeeEl = document.getElementById('calc-oee-actual');
            let resultsDiv = document.getElementById('calculated-results');
            
            if(aActualEl) aActualEl.innerHTML = `${availActual.toFixed(1)}%`;
            if(pEl) pEl.innerHTML = `${performance.toFixed(1)}%`;
            if(qEl) qEl.innerHTML = `${quality.toFixed(1)}%`;
            if(oeeEl) oeeEl.innerHTML = `${oeeActual.toFixed(1)}%`;
            if(resultsDiv) resultsDiv.style.display = 'block';
        }
        
        function renderInputPage() { 
            let editBanner = editMode ? `
                <div style="background:rgba(245,158,11,0.1); padding:12px; border-radius:8px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                    <span class="edit-mode-badge">✏️ EDIT MODE</span>
                    <span style="color:var(--text-primary); font-size:14px;">Anda sedang mengedit data OEE. Klik "Update Data OEE" untuk menyimpan perubahan.</span>
                    <button class="btn btn-secondary" style="padding:6px 12px;" onclick="cancelEdit()">Batal</button>
                </div>
            ` : '';
            
            return `<div class="container-main"><div class="card">${editBanner}<div class="card-header">✏️ Input OEE Data</div>
                <div class="filter-section" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
                    <div><label class="label">Tanggal *</label><input type="date" id="input-date" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div>
                    <div><label class="label">Shift *</label><select id="input-shift" class="input-field" onchange="updateCalculations()"><option value="">Select Shift</option>${Object.keys(SHIFTS).map(s => `<option value="${s}">${s} (${SHIFTS[s].start} - ${SHIFTS[s].end})</option>`).join('')}</select></div>
                    <div><label class="label">Machine *</label><select id="input-machine" class="input-field" onchange="loadMachineData()"><option value="">Select Machine</option>${allMachines.map(m => `<option value="${m.id}">${m.machine_name} - ${m.area}</option>`).join('')}</select></div>
                    <div><label class="label">PIC / Operator *</label><input type="text" id="input-pic" class="input-field" style="text-transform:uppercase"></div>
                    <div><label class="label">Kode Produk *</label><input type="text" id="input-product" class="input-field" style="text-transform:uppercase"></div>
                    <div><label class="label">Nomor Batch *</label><input type="text" id="input-batch" class="input-field" style="text-transform:uppercase"></div>
                </div>
                <div id="odt-section" style="display:none"><h4 style="font-weight:700; margin:16px 0 12px">⏱️ ODT (Operational Downtime)</h4><div id="odt-list"></div></div>
                <div id="line-stop-mesin-section" style="display:none"><h4 style="font-weight:700; margin:16px 0 12px">🔧 Line Stop Mesin</h4><div id="line-stop-mesin-list"></div></div>
                <div id="line-stop-non-mesin-section" style="display:none"><h4 style="font-weight:700; margin:16px 0 12px">⚠️ Line Stop Non Mesin</h4><div id="line-stop-non-mesin-list"></div></div>
                <div id="minor-stop-section" style="display:none"><h4 style="font-weight:700; margin:16px 0 12px">⏸️ Minor Stop</h4><div id="minor-stop-list"></div></div>
                <div class="filter-section" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); margin-top:16px">
                    <div><label class="label">Actual Output</label><input type="number" id="input-output" min="0" class="input-field" oninput="updateCalculations()" placeholder="Required if target > 0"></div>
                    <div><label class="label">Reject</label><input type="number" id="input-reject" value="0" min="0" class="input-field" oninput="updateCalculations()"></div>
                </div>
                <div id="calculated-results" style="display:none; background:var(--bg-secondary); padding:20px; border-radius:12px; margin:20px 0">
                    <h4 style="font-weight:700; margin-bottom:16px">🧮 Calculated Results</h4>
                    <div class="filter-section" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
                        <div><div class="scorecard-label">Availability Actual</div><div id="calc-a-actual" style="font-size:24px; font-weight:700">0%</div></div>
                        <div><div class="scorecard-label">Performance</div><div id="calc-p" style="font-size:24px; font-weight:700">0%</div></div>
                        <div><div class="scorecard-label">Quality</div><div id="calc-q" style="font-size:24px; font-weight:700">0%</div></div>
                        <div><div class="scorecard-label">OEE Actual</div><div id="calc-oee-actual" style="font-size:24px; font-weight:700">0%</div></div>
                    </div>
                </div>
                <div><label class="label">Catatan</label><textarea id="input-notes" rows="3" class="input-field" placeholder="Additional notes (optional)"></textarea></div>
                <div style="display:flex; gap:16px; margin-top:20px; flex-wrap:wrap">
                    <button class="btn btn-primary" onclick="saveOEEData(false)">💾 Simpan Data OEE</button>
                    ${editMode ? `<button class="btn btn-primary" onclick="saveOEEData(true)">🔄 Update Data OEE</button>` : ''}
                    <button class="btn btn-secondary" onclick="resetInputForm()">🔄 Reset Form</button>
                </div>
            </div></div>`; 
        }
        
        function cancelEdit() { 
            editMode = false; 
            editingRecordId = null; 
            resetInputForm(); 
            showToast('Edit mode cancelled', 'success'); 
            renderApp(); 
        }
        
        function openAddMachineModal() { 
            showToast('Fitur tambah mesin - Hubungi admin untuk konfigurasi lengkap', 'info'); 
        }
        function editMachine(id) { 
            showToast('Fitur edit mesin - Hubungi admin untuk konfigurasi lengkap', 'info'); 
        }
        function confirmDeleteMachine(id, name) { 
            showToast(`Hapus mesin ${name} - Hubungi admin untuk konfirmasi`, 'info'); 
        }
        
        function renderApp() { 
            let app = document.getElementById('app-wrapper'); 
            let header = `<div style="background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); padding:24px"><div class="container-main"><h1 style="color:white;font-size:28px;font-weight:900">${defaultConfig.system_title}</h1><p style="color:rgba(255,255,255,0.9)">${defaultConfig.company_name}</p><p style="color:white;font-size:12px;margin-top:4px">${new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</p></div></div>`; 
            let nav = `<div class="container-main"><div class="nav-tabs"><button class="nav-tab ${currentPage === 'dashboard' ? 'active' : ''}" onclick="navigateTo('dashboard')">📊 Dashboard</button><button class="nav-tab ${currentPage === 'input' ? 'active' : ''}" onclick="navigateTo('input')">✏️ Input OEE</button><button class="nav-tab ${currentPage === 'management' ? 'active' : ''}" onclick="navigateTo('management')">⚙️ Management</button></div></div>`; 
            let content = ''; 
            if(currentPage === 'dashboard') content = renderDashboard(); 
            else if(currentPage === 'input') content = renderInputPage(); 
            else if(currentPage === 'management') content = isManagementUnlocked ? renderManagementPage() : renderManagementLogin(); 
            app.innerHTML = header + nav + content; 
            if(currentPage === 'dashboard') setTimeout(renderCharts, 100); 
        }
        
        async function init() { 
            let savedTheme = localStorage.getItem('oee-theme') || 'light'; 
            document.documentElement.setAttribute('data-theme', savedTheme); 
            document.getElementById('theme-toggle-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙'; 
            showLoading('Menghubungkan ke database...'); 
            await loadMachines(); 
            await loadOEERecords(); 
            hideLoading(); 
            renderApp(); 
            setInterval(async() => { await loadOEERecords(); if(currentPage === 'dashboard') renderCharts(); }, 3600000); 
        }
        
        window.toggleTheme = toggleTheme;
        window.navigateTo = navigateTo;
        window.updateFilter = updateFilter;
        window.unlockManagement = unlockManagement;
        window.saveOEEData = saveOEEData;
        window.resetInputForm = resetInputForm;
        window.loadMachineData = loadMachineData;
        window.toggleODT = toggleODT;
        window.toggleLineStopMesin = toggleLineStopMesin;
        window.toggleLineStopNonMesin = toggleLineStopNonMesin;
        window.toggleMinorStop = toggleMinorStop;
        window.updateCalculations = updateCalculations;
        window.loadOEERecordForEdit = loadOEERecordForEdit;
        window.searchEditRecords = searchEditRecords;
        window.resetSearch = resetSearch;
        window.openAddMachineModal = openAddMachineModal;
        window.editMachine = editMachine;
        window.confirmDeleteMachine = confirmDeleteMachine;
        window.showRecordDetail = showRecordDetail;
        window.cancelEdit = cancelEdit;
        window.closeModal = closeModal;
        
        init();
    </script>
</body>
